<section id="patrocinadores" class="section section-patrocinadores">
  <div class="container">
    <div class="section-label light">Apoiadores</div>
    <h2 class="section-title light" style="color:white;">Nossos <strong>Patrocinadores</strong></h2>
    <div id="patrochadoresContent" style="margin-top:48px;"></div>
  </div>
</section>
<div class="admin-nav-item" data-tab="patrocinadores" onclick="showTab('patrocinadores')">🤝 Patrocinadores</div>
<div class="adm-tab" data-tab="patrocinadores" style="display:none;">
  <div class="adm-section-title">🤝 Gerenciar Patrocinadores</div>

  <div style="display:grid; gap:15px; margin-bottom:30px; background:rgba(255,255,255,0.03); padding:20px; border-radius:8px;">
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
      <div>
        <label class="adm-label">Nome da Empresa *</label>
        <input id="patrNome" class="adm-input" placeholder="Ex: Empresa ABC" />
      </div>
      <div>
        <label class="adm-label">Categoria (Tier)</label>
        <select id="patrTier" class="adm-input">
          <option value="ouro">🥇 Ouro (Master)</option>
          <option value="prata">🥈 Prata</option>
          <option value="bronze">🥉 Bronze</option>
          <option value="apoio">🤝 Apoio</option>
        </select>
      </div>
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
      <div>
        <label class="adm-label">URL do Logo (SVG ou PNG Transparente)</label>
        <input id="patrLogo" class="adm-input" placeholder="https://link-da-imagem.png" />
      </div>
      <div>
        <label class="adm-label">Site do Patrocinador</label>
        <input id="patrSite" class="adm-input" placeholder="https://www.site.com.br" />
      </div>
    </div>
    <div>
      <label class="adm-label">Ano de Vigência</label>
      <input id="patrAno" class="adm-input" type="number" value="2025" />
    </div>
    <button class="adm-btn-green" onclick="addPatrocinador()" style="margin-top:10px;">+ Adicionar ou Salvar Patrocinador</button>
  </div>

  <div class="patr-list" id="patrList"></div>
</div>
